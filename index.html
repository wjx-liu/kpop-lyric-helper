            '많이': { meaning: '很多', pos: '副词' },
            '잘': { meaning: '好地', pos: '副词' },
            '못': { meaning: '不能', pos: '副词' },
            '안': { meaning: '不', pos: '副词' },
            '다시': { meaning: '再次', pos: '副词' },
            '아직': { meaning: '还', pos: '副词' },
            '항상': { meaning: '总是', pos: '副词' },
            '자주': { meaning: '经常', pos: '副词' },
            '가끔': { meaning: '偶尔', pos: '副词' },
            '함께': { meaning: '一起', pos: '副词' },
            '같이': { meaning: '一起', pos: '副词' },
            '혼자': { meaning: '独自', pos: '副词' },
            '꼭': { meaning: '一定', pos: '副词' },
            '왜': { meaning: '为什么', pos: '副词' },
            '어떻게': { meaning: '怎么', pos: '副词' }
        };

        function lookupDictionary(word) {
            if (dictionary[word]) return dictionary[word];
            
            // 尝试去掉词尾
            const stems = [
                word.replace(/하다$/, ''),
                word.replace(/다$/, ''),
                word.replace(/은$|는$|을$|를$|이$|가$/, ''),
                word.replace(/어$|아$|여$/, ''),
                word.replace(/고$|서$|니$|면$/, '')
            ];
            
            for (let stem of stems) {
                if (dictionary[stem]) return dictionary[stem];
            }
            
            // 特殊匹配
            if (word === '있어') return dictionary['있다'];
            if (word === '같이') return dictionary['같이'];
            if (word === '가자') return { meaning: '走吧', pos: '动词' };
            
            return { meaning: '(词库待补充)', pos: '未知' };
        }

        // ==================== 韩文处理工具 ====================
        const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const JUNG = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
        const JONG = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

        function decompose(hangul) {
            const code = hangul.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return null;
            const cho = Math.floor(code / 588);
            const jung = Math.floor((code - cho * 588) / 28);
            const jong = code % 28;
            return { cho: CHO[cho], jung: JUNG[jung], jong: JONG[jong] };
        }

        function hasBatchim(char) {
            const d = decompose(char);
            return d ? d.jong !== '' : false;
        }

        function getBatchim(char) {
            const d = decompose(char);
            if (!d || !d.jong) return null;
            const doubleMap = { 'ㄳ': 'ㄱ', 'ㄵ': 'ㄴ', 'ㄶ': 'ㄴ', 'ㄺ': 'ㄱ', 'ㄻ': 'ㅁ', 'ㄼ': 'ㄹ', 'ㄽ': 'ㄹ', 'ㄾ': 'ㄹ', 'ㄿ': 'ㅂ', 'ㅀ': 'ㄹ', 'ㅄ': 'ㅂ' };
            return doubleMap[d.jong] || d.jong;
        }

        function endsWith(char, batchim) {
            return getBatchim(char) === batchim;
        }

        function startsWith(char, target) {
            const d = decompose(char);
            if (!d) return false;
            const vowels = JUNG;
            if (vowels.includes(target)) {
                return d.cho === 'ㅇ' && d.jung === target;
            }
            return d.cho === target;
        }

        // ==================== 音变规则 ====================
        function applySoundChanges(text) {
            const chars = text.split('');
            const explanations = [];
            
            for (let i = 0; i < chars.length - 1; i++) {
                const cur = chars[i];
                const nxt = chars[i + 1];
                
                if (!decompose(cur) || !decompose(nxt)) continue;
                
                // 腭化
                if (endsWith(cur, 'ㅌ') && startsWith(nxt, 'ㅣ')) {
                    const d = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(d.cho) * 588 + JUNG.indexOf(d.jung) * 28);
                    chars[i] = newCur;
                    chars[i + 1] = '치';
                    explanations.push({
                        original: cur + nxt,
                        changed: newCur + '치',
                        explanation: '「腭化现象」：收音 \'ㅌ\' 遇到元音 \'ㅣ\' 时，发音变为 \'ㅊ\'。'
                    });
                    continue;
                }
                
                // 连读
                if (hasBatchim(cur) && nxt === 'ㅇ') {
                    const batchim = getBatchim(cur);
                    const dCur = decompose(cur);
                    const dNxt = decompose(nxt);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28);
                    const newNxt = String.fromCharCode(0xAC00 + CHO.indexOf(batchim) * 588 + JUNG.indexOf(dNxt.jung) * 28);
                    chars[i] = newCur;
                    chars[i + 1] = newNxt;
                    explanations.push({
                        original: cur + nxt,
                        changed: newCur + newNxt,
                        explanation: `「连读」：代表零声母的 'ㅇ' 不发音，前面收音 '${batchim}' 移到后面连读。`
                    });
                    continue;
                }
                
                // 紧音化
                const batchim = getBatchim(cur);
                const tightMap = { 'ㄱ': 'ㄲ', 'ㄷ': 'ㄸ', 'ㅂ': 'ㅃ', 'ㅅ': 'ㅆ', 'ㅈ': 'ㅉ' };
                if (batchim && ['ㄱ', 'ㄷ', 'ㅂ'].includes(batchim) && tightMap[nxt[0]]) {
                    const dNxt = decompose(nxt);
                    const newNxt = String.fromCharCode(0xAC00 + CHO.indexOf(tightMap[nxt[0]]) * 588 + JUNG.indexOf(dNxt.jung) * 588 + (dNxt.jong ? JONG.indexOf(dNxt.jong) : 0));
                    chars[i + 1] = newNxt;
                    explanations.push({
                        original: cur + nxt,
                        changed: cur + newNxt,
                        explanation: `「紧音化」：收音 '${batchim}' 后遇到 '${nxt[0]}'，变为紧音 '${tightMap[nxt[0]]}'。`
                    });
                }
            }
            
            return {
                text: chars.join(''),
                explanations: explanations
            };
        }

        // ==================== 分词器 ====================
        const particles = ['은', '는', '이', '가', '을', '를', '에', '에서', '로', '으로', '와', '과', '의', '도', '만', '까지', '부터', '처럼'];
        const endings = ['다', '요', '죠', '네', '군', '구나', '지', '고', '서', '니까', '면', '며', '지만', '자'];

        function tokenize(text) {
            const words = text.split(/\s+/);
            const tokens = [];
            
            words.forEach(word => {
                let matched = false;
                
                for (let p of particles) {
                    if (word.endsWith(p) && word.length > p.length) {
                        tokens.push({
                            original: word,
                            stem: word.slice(0, -p.length),
                            particle: p,
                            ending: null,
                            type: 'noun+particle'
                        });
                        matched = true;
                        break;
                    }
                }
                
                if (!matched) {
                    for (let e of endings) {
                        if (word.endsWith(e) && word.length > e.length) {
                            tokens.push({
                                original: word,
                                stem: word.slice(0, -e.length),
                                particle: null,
                                ending: e,
                                type: 'verb+ending'
                            });
                            matched = true;
                            break;
                        }
                    }
                }
                
                if (!matched) {
                    tokens.push({
                        original: word,
                        stem: word,
                        particle: null,
                        ending: null,
                        type: 'word'
                    });
                }
            });
            
            return tokens;
        }

        // ==================== 词频分析 ====================
        function analyzeVocabulary(tokens) {
            const freqMap = new Map();
            const categoryMap = new Map();
            
            tokens.forEach(t => {
                const word = t.stem;
                freqMap.set(word, (freqMap.get(word) || 0) + 1);
                
                const pos = lookupDictionary(word).pos;
                if (!categoryMap.has(pos)) categoryMap.set(pos, new Map());
                const posMap = categoryMap.get(pos);
                posMap.set(word, (posMap.get(word) || 0) + 1);
            });
            
            return { freqMap, categoryMap };
        }

        function extractGrammar(tokens) {
            const grammarFreq = new Map();
            
            tokens.forEach(t => {
                if (t.ending) grammarFreq.set(t.ending, (grammarFreq.get(t.ending) || 0) + 1);
                if (t.particle) grammarFreq.set(t.particle, (grammarFreq.get(t.particle) || 0) + 1);
            });
            
            const explanations = {
                '는': '主题助词，表示句子主题或对比',
                '은': '主题助词，用于有收音的词后',
                '가': '主格助词，表示主语',
                '이': '主格助词，用于有收音的词后',
                '를': '宾格助词，表示动作对象',
                '을': '宾格助词，用于有收音的词后',
                '에': '地点/时间助词',
                '에서': '动作发生地点助词',
                '요': '敬语终结词尾',
                '다': '基本形终结词尾',
                '고': '连接词尾，表示并列',
                '지': '连接词尾，表示原因或确认',
                '자': '共动式终结词尾，表示"一起做..."'
            };
            
            return Array.from(grammarFreq.entries()).map(([g, count]) => ({
                grammar: g,
                count,
                explanation: explanations[g] || '待补充'
            }));
        }

        // ==================== 主程序 ====================
        document.addEventListener('DOMContentLoaded', function() {
            const lyricsInput = document.getElementById('lyricsInput');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const resultsSection = document.getElementById('resultsSection');
            const sentenceContent = document.getElementById('sentenceContent');
            const vocabularyContent = document.getElementById('vocabularyContent');
            const grammarContent = document.getElementById('grammarContent');
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabPanels = document.querySelectorAll('.tab-panel');
            const exampleBtns = document.querySelectorAll('.example-btn');

            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.dataset.tab;
                    tabBtns.forEach(b => b.classList.remove('active'));
                    tabPanels.forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(tabId + 'Panel').classList.add('active');
                });
            });

            exampleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    lyricsInput.value = btn.dataset.lyric;
                    analyzeLyrics();
                });
            });

            analyzeBtn.addEventListener('click', analyzeLyrics);

            function analyzeLyrics() {
                const text = lyricsInput.value.trim();
                if (!text) { alert('请输入韩语歌词'); return; }

                const tokens = tokenize(text);
                const soundResult = applySoundChanges(text);
                const { freqMap, categoryMap } = analyzeVocabulary(tokens);
                const grammarList = extractGrammar(tokens);

                renderSentencePanel(tokens, soundResult);
                renderVocabularyPanel(categoryMap, freqMap);
                renderGrammarPanel(grammarList);

                resultsSection.style.display = 'block';
                resultsSection.scrollIntoView({ behavior: 'smooth' });
            }

            function renderSentencePanel(tokens, soundResult) {
                let html = `<div class="sentence-item">`;
                html += `<div class="sentence-original">📝 原文：${tokens.map(t => t.original).join(' ')}</div>`;
                html += `<div class="sentence-original" style="font-size: 1.1rem; color: #764ba2;">🔊 发音：${soundResult.text}</div>`;
                html += `<div class="word-breakdown">`;
                
                tokens.forEach(t => {
                    const word = t.stem;
                    const dict = lookupDictionary(word);
                    const pron = applySoundChanges(word).text;
                    
                    html += `<div class="word-card">`;
                    html += `<span class="word-text">${word}</span>`;
                    html += `<span class="word-pronunciation">[${pron}]</span>`;
                    html += `<span style="display: block; font-size: 0.85rem; color: #666; margin-top: 4px;">${dict.meaning}</span>`;
                    if (t.particle) html += `<span style="display: block; font-size: 0.8rem; color: #999;">+ ${t.particle} (助词)</span>`;
                    if (t.ending) html += `<span style="display: block; font-size: 0.8rem; color: #999;">+ ${t.ending} (词尾)</span>`;
                    html += `</div>`;
                });
                
                html += `</div>`;
                
                if (soundResult.explanations.length > 0) {
                    html += `<div style="margin-top: 16px;"><h4 style="color: #333; margin-bottom: 12px;">🔬 音变现象解释：</h4>`;
                    soundResult.explanations.forEach(exp => {
                        html += `<div class="rule-explanation"><strong>${exp.original} → ${exp.changed}</strong><br>${exp.explanation}</div>`;
                    });
                    html += `</div>`;
                }
                
                html += `</div>`;
                sentenceContent.innerHTML = html;
            }

            function renderVocabularyPanel(categoryMap, freqMap) {
                let html = '';
                const categoryNames = { '名词': '📦 名词', '动词': '🏃 动词', '形容词': '🎨 形容词', '副词': '⚡ 副词', '数词': '🔢 数词', '代词': '👤 代词', '未知': '📌 其他' };
                
                for (let [cat, name] of Object.entries(categoryNames)) {
                    const wordMap = categoryMap.get(cat);
                    if (!wordMap || wordMap.size === 0) continue;
                    
                    const sorted = Array.from(wordMap.entries()).sort((a, b) => b[1] - a[1]);
                    
                    html += `<div class="vocab-category"><h3>${name} (${sorted.length}个)</h3>`;
                    html += `<table class="vocab-table"><thead><tr><th>韩语</th><th>发音</th><th>释义</th><th>次数</th></tr></thead><tbody>`;
                    
                    sorted.forEach(([w, c]) => {
                        const dict = lookupDictionary(w);
                        const pron = applySoundChanges(w).text;
                        html += `<tr><td><strong>${w}</strong></td><td><span style="color:#764ba2;">[${pron}]</span></td><td>${dict.meaning}</td><td><span class="freq-badge">${c}次</span></td></tr>`;
                    });
                    
                    html += `</tbody></table></div>`;
                }
                
                vocabularyContent.innerHTML = html;
            }

            function renderGrammarPanel(grammarList) {
                let html = '';
                if (grammarList.length === 0) {
                    html = `<p style="color:#999; text-align:center; padding:40px;">未识别到明显语法尾缀</p>`;
                } else {
                    html += `<table class="vocab-table"><thead><tr><th>语法/助词</th><th>次数</th><th>解释</th></tr></thead><tbody>`;
                    grammarList.sort((a, b) => b.count - a.count).forEach(item => {
                        html += `<tr><td><strong>${item.grammar}</strong></td><td><span class="freq-badge">${item.count}次</span></td><td>${item.explanation}</td></tr>`;
                    });
                    html += `</tbody></table>`;
                }
                grammarContent.innerHTML = html;
            }

            document.getElementById('downloadPdfBtn').addEventListener('click', () => {
                window.print();
            });
        });
    </script>
</body>
