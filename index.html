            '아름답다': { meaning: '美丽', pos: '形容词' }, '예쁘다': { meaning: '漂亮', pos: '形容词' }, '멋있다': { meaning: '帅', pos: '形容词' },
            '재미있다': { meaning: '有趣', pos: '形容词' }, '재미없다': { meaning: '无趣', pos: '形容词' }, '슬프다': { meaning: '悲伤', pos: '形容词' },
            '기쁘다': { meaning: '高兴', pos: '形容词' }, '즐겁다': { meaning: '愉快', pos: '形容词' }, '행복하다': { meaning: '幸福', pos: '形容词' },
            '불행하다': { meaning: '不幸', pos: '形容词' }, '외롭다': { meaning: '孤独', pos: '形容词' }, '무섭다': { meaning: '可怕', pos: '形容词' },
            '바쁘다': { meaning: '忙', pos: '形容词' }, '한가하다': { meaning: '闲', pos: '形容词' }, '배고프다': { meaning: '饿', pos: '形容词' },
            '배부르다': { meaning: '饱', pos: '形容词' }, '목마르다': { meaning: '渴', pos: '形容词' }, '피곤하다': { meaning: '累', pos: '形容词' },
            '아프다': { meaning: '疼', pos: '形容词' }, '건강하다': { meaning: '健康', pos: '形容词' }, '조용하다': { meaning: '安静', pos: '形容词' },
            '시끄럽다': { meaning: '吵闹', pos: '形容词' }, '복잡하다': { meaning: '复杂/拥挤', pos: '形容词' }, '편하다': { meaning: '舒服', pos: '形容词' },
            '불편하다': { meaning: '不舒服', pos: '形容词' }, '필요하다': { meaning: '需要', pos: '形容词' }, '가능하다': { meaning: '可能', pos: '形容词' },
            '불가능하다': { meaning: '不可能', pos: '形容词' }, '비슷하다': { meaning: '相似', pos: '形容词' }, '다르다': { meaning: '不同', pos: '形容词' },
            '같다': { meaning: '一样', pos: '形容词' }, '괜찮다': { meaning: '没关系/不错', pos: '形容词' }, '미안하다': { meaning: '对不起', pos: '形容词' },
            '감사하다': { meaning: '感谢', pos: '形容词' }, '반갑다': { meaning: '高兴见到', pos: '形容词' }, '힘들다': { meaning: '累，吃力', pos: '形容词' },
            // 副词/感叹词/其他
            '너무': { meaning: '太', pos: '副词' }, '정말': { meaning: '真的', pos: '副词' }, '진짜': { meaning: '真的', pos: '副词' },
            '아주': { meaning: '非常', pos: '副词' }, '매우': { meaning: '非常', pos: '副词' }, '조금': { meaning: '一点', pos: '副词' },
            '많이': { meaning: '很多', pos: '副词' }, '잘': { meaning: '好地', pos: '副词' }, '못': { meaning: '不能', pos: '副词' },
            '안': { meaning: '不', pos: '副词' }, '다시': { meaning: '再次', pos: '副词' }, '아직': { meaning: '还', pos: '副词' },
            '벌써': { meaning: '已经', pos: '副词' }, '항상': { meaning: '总是', pos: '副词' }, '자주': { meaning: '经常', pos: '副词' },
            '가끔': { meaning: '偶尔', pos: '副词' }, '함께': { meaning: '一起', pos: '副词' }, '같이': { meaning: '一起', pos: '副词' },
            '혼자': { meaning: '独自', pos: '副词' }, '바로': { meaning: '正是/马上', pos: '副词' }, '꼭': { meaning: '一定', pos: '副词' },
            '왜': { meaning: '为什么', pos: '副词' }, '어떻게': { meaning: '怎么', pos: '副词' }, '언제': { meaning: '什么时候', pos: '副词' },
            '어디': { meaning: '哪里', pos: '副词' }, '누구': { meaning: '谁', pos: '代词' }, '무엇': { meaning: '什么', pos: '代词' },
            '뭐': { meaning: '什么', pos: '代词' },
            // SEVENTEEN & K-pop 特供
            '캐럿': { meaning: 'CARAT (粉丝名)', pos: '名词' }, '세븐틴': { meaning: 'SEVENTEEN', pos: '名词' },
            '손오공': { meaning: '孙悟空', pos: '名词' }, '신': { meaning: '神', pos: '名词' }, '아침': { meaning: '早上', pos: '名词' },
            '만세': { meaning: '万岁', pos: '名词' }, '파이팅': { meaning: '加油', pos: '感叹词' },
            '괜찮아': { meaning: '没关系', pos: '形容词' }, '고마워': { meaning: '谢谢', pos: '动词' },
            'NICE': { meaning: '好，很棒', pos: '外来词' }, '나이스': { meaning: '好，很棒', pos: '外来词' }
        };

        function lookupDictionary(word) {
            if (dictionary[word]) return dictionary[word];
            // 尝试去掉词尾
            const stems = [
                word.replace(/하다$/, ''), word.replace(/다$/, ''), 
                word.replace(/은$|는$|을$|를$|이$|가$/, ''), word.replace(/어$|아$|여$/, ''),
                word.replace(/고$|서$|니$|면$|지$/, '')
            ];
            for (let stem of stems) if (dictionary[stem]) return dictionary[stem];
            // 特定变形
            if (word === '있어') return dictionary['있다']; if (word === '같이') return dictionary['같이'];
            if (word === '가자') return { meaning: '走吧', pos: '动词' }; if (word === '와') return { meaning: '来', pos: '动词' };
            if (word === '사랑해') return { meaning: '我爱你', pos: '短语' }; if (word === '보고 싶어') return { meaning: '想你', pos: '短语' };
            return { meaning: '(词库待补充)', pos: '未知' };
        }

        // ==================== 韩文处理工具 ====================
        const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const JUNG = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
        const JONG = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

        function decompose(hangul) {
            const code = hangul.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return null;
            const cho = Math.floor(code / 588), jung = Math.floor((code - cho * 588) / 28), jong = code % 28;
            return { cho: CHO[cho], jung: JUNG[jung], jong: JONG[jong] };
        }
        function hasBatchim(char) { const d = decompose(char); return d ? d.jong !== '' : false; }
        function getBatchim(char) {
            const d = decompose(char); if (!d || !d.jong) return null;
            const doubleMap = { 'ㄳ': 'ㄱ', 'ㄵ': 'ㄴ', 'ㄶ': 'ㄴ', 'ㄺ': 'ㄱ', 'ㄻ': 'ㅁ', 'ㄼ': 'ㄹ', 'ㄽ': 'ㄹ', 'ㄾ': 'ㄹ', 'ㄿ': 'ㅂ', 'ㅀ': 'ㄹ', 'ㅄ': 'ㅂ' };
            return doubleMap[d.jong] || d.jong;
        }
        function endsWith(char, batchim) { return getBatchim(char) === batchim; }
        function startsWith(char, target) {
            const d = decompose(char); if (!d) return false;
            if (JUNG.includes(target)) return d.cho === 'ㅇ' && d.jung === target;
            return d.cho === target;
        }

        // ==================== 音变规则 (完整版) ====================
        function applySoundChanges(text) {
            const chars = text.split(''); const explanations = [];
            for (let i = 0; i < chars.length - 1; i++) {
                const cur = chars[i], nxt = chars[i + 1];
                if (!decompose(cur) || !decompose(nxt)) continue;

                // 1. 腭化
                if (endsWith(cur, 'ㅌ') && startsWith(nxt, 'ㅣ')) {
                    const d = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(d.cho) * 588 + JUNG.indexOf(d.jung) * 28);
                    chars[i] = newCur; chars[i + 1] = '치';
                    explanations.push({ original: cur + nxt, changed: newCur + '치', explanation: '「腭化现象」：收音 \'ㅌ\' 遇到元音 \'ㅣ\' 时，发音变为 \'ㅊ\'。' });
                    continue;
                }
                // 2. 连读
                if (hasBatchim(cur) && nxt === 'ㅇ') {
                    const batchim = getBatchim(cur), dCur = decompose(cur), dNxt = decompose(nxt);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28);
                    const newNxt = String.fromCharCode(0xAC00 + CHO.indexOf(batchim) * 588 + JUNG.indexOf(dNxt.jung) * 28);
                    chars[i] = newCur; chars[i + 1] = newNxt;
                    explanations.push({ original: cur + nxt, changed: newCur + newNxt, explanation: `「连读」：代表零声母的 'ㅇ' 不发音，前面收音 '${batchim}' 移到后面连读。` });
                    continue;
                }
                // 3. 紧音化
                const batchim = getBatchim(cur);
                const tightMap = { 'ㄱ': 'ㄲ', 'ㄷ': 'ㄸ', 'ㅂ': 'ㅃ', 'ㅅ': 'ㅆ', 'ㅈ': 'ㅉ' };
                if (batchim && ['ㄱ', 'ㄷ', 'ㅂ'].includes(batchim) && tightMap[nxt[0]]) {
                    const dNxt = decompose(nxt);
                    const newNxt = String.fromCharCode(0xAC00 + CHO.indexOf(tightMap[nxt[0]]) * 588 + JUNG.indexOf(dNxt.jung) * 588 + (dNxt.jong ? JONG.indexOf(dNxt.jong) : 0));
                    chars[i + 1] = newNxt;
                    explanations.push({ original: cur + nxt, changed: cur + newNxt, explanation: `「紧音化」：收音 '${batchim}' 后遇到 '${nxt[0]}'，变为紧音 '${tightMap[nxt[0]]}'。` });
                }
                // 4. 鼻音化
                if (batchim && ['ㄱ', 'ㄷ', 'ㅂ'].includes(batchim) && ['ㄴ', 'ㅁ'].includes(nxt[0])) {
                    const nasalMap = { 'ㄱ': 'ㅇ', 'ㄷ': 'ㄴ', 'ㅂ': 'ㅁ' };
                    const dCur = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28 + JONG.indexOf(nasalMap[batchim]));
                    chars[i] = newCur;
                    explanations.push({ original: cur + nxt, changed: newCur + nxt, explanation: `「鼻音化」：收音 '${batchim}' 遇到鼻音 '${nxt[0]}'，变为 '${nasalMap[batchim]}'。` });
                }
                // 5. 流音化
                if (batchim === 'ㄴ' && nxt[0] === 'ㄹ') {
                    const dCur = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28 + JONG.indexOf('ㄹ'));
                    chars[i] = newCur;
                    explanations.push({ original: cur + nxt, changed: newCur + nxt, explanation: `「流音化」：收音 'ㄴ' 遇到 'ㄹ'，变为 'ㄹ'。` });
                }
            }
            return { text: chars.join(''), explanations: explanations };
        }

        // ==================== 分词器 ====================
        const particles = ['은', '는', '이', '가', '을', '를', '에', '에서', '로', '으로', '와', '과', '의', '도', '만', '까지', '부터', '처럼'];
        const endings = ['다', '요', '죠', '네', '군', '구나', '지', '고', '서', '니까', '면', '며', '지만', '자'];
        function tokenize(text) {
            const words = text.split(/\s+/); const tokens = [];
            words.forEach(word => {
                let matched = false;
                for (let p of particles) if (word.endsWith(p) && word.length > p.length) { tokens.push({ original: word, stem: word.slice(0, -p.length), particle: p, ending: null, type: 'noun+particle' }); matched = true; break; }
                if (!matched) for (let e of endings) if (word.endsWith(e) && word.length > e.length) { tokens.push({ original: word, stem: word.slice(0, -e.length), particle: null, ending: e, type: 'verb+ending' }); matched = true; break; }
                if (!matched) tokens.push({ original: word, stem: word, particle: null, ending: null, type: 'word' });
            });
            return tokens;
        }

        // ==================== 词频分析 ====================
        function analyzeVocabulary(tokens) {
            const freqMap = new Map(), categoryMap = new Map();
            tokens.forEach(t => { const w = t.stem; freqMap.set(w, (freqMap.get(w) || 0) + 1); const pos = lookupDictionary(w).pos; if (!categoryMap.has(pos)) categoryMap.set(pos, new Map()); categoryMap.get(pos).set(w, (categoryMap.get(pos).get(w) || 0) + 1); });
            return { freqMap, categoryMap };
        }
        function extractGrammar(tokens) {
            const gf = new Map(); tokens.forEach(t => { if (t.ending) gf.set(t.ending, (gf.get(t.ending) || 0) + 1); if (t.particle) gf.set(t.particle, (gf.get(t.particle) || 0) + 1); });
            const expl = { '는': '主题助词', '은': '主题助词', '가': '主格助词', '이': '主格助词', '를': '宾格助词', '을': '宾格助词', '에': '地点/时间助词', '에서': '动作发生地点助词', '요': '敬语词尾', '다': '基本形词尾', '고': '连接词尾(并列)', '지': '连接词尾(原因/确认)', '자': '共动式词尾(一起做...)' };
            return Array.from(gf.entries()).map(([g, c]) => ({ grammar: g, count: c, explanation: expl[g] || '待补充' }));
        }

        // ==================== 主程序 ====================
        document.addEventListener('DOMContentLoaded', function() {
            const inp = document.getElementById('lyricsInput'), ab = document.getElementById('analyzeBtn'), rs = document.getElementById('resultsSection');
            const sc = document.getElementById('sentenceContent'), vc = document.getElementById('vocabularyContent'), gc = document.getElementById('grammarContent');
            const tbs = document.querySelectorAll('.tab-btn'), tps = document.querySelectorAll('.tab-panel'), ebs = document.querySelectorAll('.example-btn');

            tbs.forEach(b => b.addEventListener('click', () => { const tid = b.dataset.tab; tbs.forEach(bn => bn.classList.remove('active')); tps.forEach(p => p.classList.remove('active')); b.classList.add('active'); document.getElementById(tid + 'Panel').classList.add('active'); }));
            ebs.forEach(b => b.addEventListener('click', () => { inp.value = b.dataset.lyric; analyzeLyrics(); }));
            ab.addEventListener('click', analyzeLyrics);
            function analyzeLyrics() {
                const text = inp.value.trim(); if (!text) { alert('请输入韩语歌词'); return; }
                const tokens = tokenize(text), snd = applySoundChanges(text), { freqMap, categoryMap } = analyzeVocabulary(tokens), gl = extractGrammar(tokens);
                renderSentence(tokens, snd); renderVocab(categoryMap, freqMap); renderGrammar(gl);
                rs.style.display = 'block'; rs.scrollIntoView({ behavior: 'smooth' });
            }
            function renderSentence(tokens, snd) {
                let h = `<div class="sentence-item"><div class="sentence-original">📝 原文：${tokens.map(t => t.original).join(' ')}</div><div class="sentence-original" style="font-size:1.1rem;color:#764ba2;">🔊 发音：${snd.text}</div><div class="word-breakdown">`;
                tokens.forEach(t => { const d = lookupDictionary(t.stem), p = applySoundChanges(t.stem).text; h += `<div class="word-card"><span class="word-text">${t.stem}</span><span class="word-pronunciation">[${p}]</span><span style="display:block;font-size:0.85rem;color:#666;margin-top:4px;">${d.meaning}</span>${t.particle ? `<span style="display:block;font-size:0.8rem;color:#999;">+ ${t.particle} (助词)</span>` : ''}${t.ending ? `<span style="display:block;font-size:0.8rem;color:#999;">+ ${t.ending} (词尾)</span>` : ''}</div>`; });
                h += `</div>`;
                if (snd.explanations.length) { h += `<div style="margin-top:16px;"><h4>🔬 音变现象解释：</h4>`; snd.explanations.forEach(e => h += `<div class="rule-explanation"><strong>${e.original} → ${e.changed}</strong><br>${e.explanation}</div>`); h += `</div>`; }
                sc.innerHTML = h + `</div>`;
            }
            function renderVocab(cm, fm) {
                let h = ''; const cns = { '名词': '📦 名词', '动词': '🏃 动词', '形容词': '🎨 形容词', '副词': '⚡ 副词', '短语': '💬 短语', '感叹词': '💬 感叹词', '外来词': '🌐 外来词', '未知': '📌 其他' };
                for (let [cat, name] of Object.entries(cns)) { const wm = cm.get(cat); if (!wm || !wm.size) continue; const sorted = Array.from(wm.entries()).sort((a,b) => b[1] - a[1]); h += `<div class="vocab-category"><h3>${name} (${sorted.length}个)</h3><table class="vocab-table"><thead><tr><th>韩语</th><th>发音</th><th>释义</th><th>次数</th></tr></thead><tbody>`; sorted.forEach(([w,c]) => { const d = lookupDictionary(w), p = applySoundChanges(w).text; h += `<tr><td><strong>${w}</strong></td><td><span style="color:#764ba2;">[${p}]</span></td><td>${d.meaning}</td><td><span class="freq-badge">${c}次</span></td></tr>`; }); h += `</tbody></table></div>`; }
                vc.innerHTML = h;
            }
            function renderGrammar(gl) {
                let h = ''; if (!gl.length) h = `<p style="color:#999;text-align:center;padding:40px;">未识别到明显语法尾缀</p>`;
                else { h += `<table class="vocab-table"><thead><tr><th>语法/助词</th><th>次数</th><th>解释</th></tr></thead><tbody>`; gl.sort((a,b) => b.count - a.count).forEach(i => h += `<tr><td><strong>${i.grammar}</strong></td><td><span class="freq-badge">${i.count}次</span></td><td>${i.explanation}</td></tr>`); h += `</tbody></table>`; }
                gc.innerHTML = h;
            }
            document.getElementById('downloadPdfBtn').addEventListener('click', () => window.print());
        });
    </script>
