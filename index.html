            '만세': { meaning: '万岁', pos: '名词' }, '파이팅': { meaning: '加油', pos: '感叹词' },
            '고마워': { meaning: '谢谢', pos: '动词' }, 'NICE': { meaning: '好', pos: '外来词' }, '나이스': { meaning: '好', pos: '外来词' }
        };

        // ==================== 修复后的词典查询函数 ====================
        function lookupDictionary(word) {
            // 直接匹配
            if (dictionary[word]) return dictionary[word];
            
            // 去掉词尾 '게' (副词形)
            if (word.endsWith('게')) {
                const stem = word.slice(0, -1) + '다';
                if (dictionary[stem]) return dictionary[stem];
            }
            
            // 去掉 '은/는/을/를/의/에'
            let cleaned = word.replace(/은$|는$|을$|를$|의$|에$/, '');
            if (dictionary[cleaned]) return dictionary[cleaned];
            
            // 去掉 'ㄴ/은' (定语形) -> 还原为 '다'
            if (word.endsWith('ㄴ') || word.endsWith('은')) {
                let stem = word.slice(0, -1);
                if (word.endsWith('은')) stem = word.slice(0, -1);
                const dictForm = stem + '다';
                if (dictionary[dictForm]) return dictionary[dictForm];
            }
            
            // 特殊不规则变形
            if (word === '메마른') return dictionary['메마르다'] || { meaning: '干涸/枯萎', pos: '形容词' };
            if (word === '하얗게') return dictionary['하얗다'] || { meaning: '白', pos: '形容词' };
            if (word === '하얀') return dictionary['하얗다'] || { meaning: '白', pos: '形容词' };
            if (word === '너의') return dictionary['너'] || { meaning: '你', pos: '代词' };
            if (word === '있어') return dictionary['있다'] || { meaning: '在/有', pos: '动词' };
            if (word === '가자') return { meaning: '走吧', pos: '动词' };
            
            return { meaning: '(待补充)', pos: '未知' };
        }

        // ==================== 韩文处理工具 ====================
        const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const JUNG = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
        const JONG = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

        function decompose(hangul) {
            const code = hangul.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return null;
            const cho = Math.floor(code / 588), jung = Math.floor((code - cho * 588) / 28), jong = code % 28;
            return { cho: CHO[cho], jung: JUNG[jung], jong: JONG[jong] };
        }
        function hasBatchim(char) { const d = decompose(char); return d ? d.jong !== '' : false; }
        function getBatchim(char) {
            const d = decompose(char); if (!d || !d.jong) return null;
            const doubleMap = { 'ㄳ': 'ㄱ', 'ㄵ': 'ㄴ', 'ㄶ': 'ㄴ', 'ㄺ': 'ㄱ', 'ㄻ': 'ㅁ', 'ㄼ': 'ㄹ', 'ㄽ': 'ㄹ', 'ㄾ': 'ㄹ', 'ㄿ': 'ㅂ', 'ㅀ': 'ㄹ', 'ㅄ': 'ㅂ' };
            return doubleMap[d.jong] || d.jong;
        }
        function endsWith(char, batchim) { return getBatchim(char) === batchim; }
        function startsWith(char, target) {
            const d = decompose(char); if (!d) return false;
            if (JUNG.includes(target)) return d.cho === 'ㅇ' && d.jung === target;
            return d.cho === target;
        }

        // ==================== 音变规则 ====================
        function applySoundChanges(text) {
            const chars = text.split(''); const explanations = [];
            for (let i = 0; i < chars.length - 1; i++) {
                const cur = chars[i], nxt = chars[i + 1];
                if (!decompose(cur) || !decompose(nxt)) continue;
                if (endsWith(cur, 'ㅌ') && startsWith(nxt, 'ㅣ')) {
                    const d = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(d.cho) * 588 + JUNG.indexOf(d.jung) * 28);
                    chars[i] = newCur; chars[i + 1] = '치';
                    explanations.push({ original: cur + nxt, changed: newCur + '치', explanation: '「腭化」：收音 \'ㅌ\' 遇到元音 \'ㅣ\'，发音变为 \'ㅊ\'。' });
                    continue;
                }
                if (hasBatchim(cur) && nxt === 'ㅇ') {
                    const batchim = getBatchim(cur), dCur = decompose(cur), dNxt = decompose(nxt);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28);
                    const newNxt = String.fromCharCode(0xAC00 + CHO.indexOf(batchim) * 588 + JUNG.indexOf(dNxt.jung) * 28);
                    chars[i] = newCur; chars[i + 1] = newNxt;
                    explanations.push({ original: cur + nxt, changed: newCur + newNxt, explanation: `「连读」：'ㅇ'不发音，收音 '${batchim}' 移到后面连读。` });
                    continue;
                }
                const batchim = getBatchim(cur);
                const tightMap = { 'ㄱ': 'ㄲ', 'ㄷ': 'ㄸ', 'ㅂ': 'ㅃ', 'ㅅ': 'ㅆ', 'ㅈ': 'ㅉ' };
                if (batchim && ['ㄱ', 'ㄷ', 'ㅂ'].includes(batchim) && tightMap[nxt[0]]) {
                    const dNxt = decompose(nxt);
                    const newNxt = String.fromCharCode(0xAC00 + CHO.indexOf(tightMap[nxt[0]]) * 588 + JUNG.indexOf(dNxt.jung) * 588 + (dNxt.jong ? JONG.indexOf(dNxt.jong) : 0));
                    chars[i + 1] = newNxt;
                    explanations.push({ original: cur + nxt, changed: cur + newNxt, explanation: `「紧音化」：收音 '${batchim}' 后遇到 '${nxt[0]}'，变为紧音。` });
                }
                if (batchim && ['ㄱ', 'ㄷ', 'ㅂ'].includes(batchim) && ['ㄴ', 'ㅁ'].includes(nxt[0])) {
                    const nasalMap = { 'ㄱ': 'ㅇ', 'ㄷ': 'ㄴ', 'ㅂ': 'ㅁ' };
                    const dCur = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28 + JONG.indexOf(nasalMap[batchim]));
                    chars[i] = newCur;
                    explanations.push({ original: cur + nxt, changed: newCur + nxt, explanation: `「鼻音化」：收音 '${batchim}' 遇到鼻音 '${nxt[0]}'，变为 '${nasalMap[batchim]}'。` });
                }
                if (batchim === 'ㄴ' && nxt[0] === 'ㄹ') {
                    const dCur = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28 + JONG.indexOf('ㄹ'));
                    chars[i] = newCur;
                    explanations.push({ original: cur + nxt, changed: newCur + nxt, explanation: `「流音化」：收音 'ㄴ' 遇到 'ㄹ'，变为 'ㄹ'。` });
                }
            }
            return { text: chars.join(''), explanations };
        }

        // ==================== 分词器（修复版）====================
        const particles = ['은', '는', '이', '가', '을', '를', '에', '에서', '로', '으로', '와', '과', '의', '도', '만', '까지', '부터', '처럼'];
        const endings = ['다', '요', '죠', '네', '군', '구나', '지', '고', '서', '니까', '면', '며', '지만', '자'];
        
        function tokenize(text) {
            const words = text.split(/\s+/); const tokens = [];
            words.forEach(word => {
                let matched = false;
                // 先检查助词
                for (let p of particles) {
                    if (word.endsWith(p) && word.length > p.length) {
                        tokens.push({ original: word, stem: word.slice(0, -p.length), particle: p, ending: null });
                        matched = true; break;
                    }
                }
                // 再检查词尾（排除 '게' 因为它是副词形，不应该拆开查词典）
                if (!matched) {
                    for (let e of endings) {
                        if (e === '게') continue; // 跳过 '게'，不作为独立词尾拆分
                        if (word.endsWith(e) && word.length > e.length) {
                            tokens.push({ original: word, stem: word.slice(0, -e.length), particle: null, ending: e });
                            matched = true; break;
                        }
                    }
                }
                // 如果 '게' 结尾，整体作为词干
                if (!matched && word.endsWith('게')) {
                    tokens.push({ original: word, stem: word, particle: null, ending: '게' });
                    matched = true;
                }
                // 'ㄴ/은' 结尾的定语形，整体作为词干
                if (!matched && (word.endsWith('ㄴ') || word.endsWith('은'))) {
                    tokens.push({ original: word, stem: word, particle: null, ending: null });
                    matched = true;
                }
                if (!matched) tokens.push({ original: word, stem: word, particle: null, ending: null });
            });
            return tokens;
        }

        // ==================== 主程序 ====================
        document.addEventListener('DOMContentLoaded', function() {
            const inp = document.getElementById('lyricsInput'), ab = document.getElementById('analyzeBtn'), rs = document.getElementById('resultsSection');
            const sc = document.getElementById('sentenceContent'), vc = document.getElementById('vocabularyContent'), gc = document.getElementById('grammarContent');
            const tbs = document.querySelectorAll('.tab-btn'), tps = document.querySelectorAll('.tab-panel'), ebs = document.querySelectorAll('.example-btn');

            tbs.forEach(b => b.addEventListener('click', () => {
                const tid = b.dataset.tab;
                tbs.forEach(bn => bn.classList.remove('active'));
                tps.forEach(p => p.classList.remove('active'));
                b.classList.add('active');
                document.getElementById(tid + 'Panel').classList.add('active');
            }));
            ebs.forEach(b => b.addEventListener('click', () => { inp.value = b.dataset.lyric; analyzeLyrics(); }));
            ab.addEventListener('click', analyzeLyrics);

            function analyzeLyrics() {
                const text = inp.value.trim(); if (!text) { alert('请输入韩语歌词'); return; }
                const tokens = tokenize(text), snd = applySoundChanges(text);
                
                const freqMap = new Map();
                tokens.forEach(t => { const w = t.stem; freqMap.set(w, (freqMap.get(w) || 0) + 1); });
                
                const gf = new Map();
                tokens.forEach(t => { if (t.ending) gf.set(t.ending, (gf.get(t.ending) || 0) + 1); if (t.particle) gf.set(t.particle, (gf.get(t.particle) || 0) + 1); });
                const expl = { '는': '主题助词', '은': '主题助词', '가': '主格助词', '이': '主格助词', '를': '宾格助词', '을': '宾格助词', '의': '所属助词', '에': '地点助词', '요': '敬语词尾', '다': '基本形词尾', '고': '连接词尾', '자': '共动式词尾', '게': '副词形词尾' };
                const gl = Array.from(gf.entries()).map(([g, c]) => ({ grammar: g, count: c, explanation: expl[g] || '待补充' }));
                
                renderSentence(tokens, snd);
                renderVocab(tokens, freqMap);
                renderGrammar(gl);
                rs.style.display = 'block';
                rs.scrollIntoView({ behavior: 'smooth' });
            }

            function renderSentence(tokens, snd) {
                let h = `<div class="sentence-item"><div class="sentence-original">📝 原文：${tokens.map(t => t.original).join(' ')}</div>`;
                h += `<div class="sentence-original" style="font-size:1.1rem;color:#764ba2;">🔊 发音：${snd.text}</div><div class="word-breakdown">`;
                
                tokens.forEach(t => {
                    const dict = lookupDictionary(t.stem);
                    const pron = applySoundChanges(t.stem).text;
                    h += `<div class="word-card"><span class="word-text">${t.stem}</span><span class="word-pronunciation">[${pron}]</span>`;
                    h += `<span style="display:block;font-size:0.85rem;color:#666;margin-top:4px;">${dict.meaning}</span>`;
                    if (t.particle) h += `<span style="display:block;font-size:0.8rem;color:#999;">+ ${t.particle} (助词)</span>`;
                    if (t.ending) h += `<span style="display:block;font-size:0.8rem;color:#999;">+ ${t.ending} (词尾)</span>`;
                    h += `</div>`;
                });
                h += `</div>`;
                if (snd.explanations.length) {
                    h += `<div style="margin-top:16px;"><h4>🔬 音变现象解释：</h4>`;
                    snd.explanations.forEach(e => h += `<div class="rule-explanation"><strong>${e.original} → ${e.changed}</strong><br>${e.explanation}</div>`);
                    h += `</div>`;
                }
                sc.innerHTML = h + `</div>`;
            }

            function renderVocab(tokens, freqMap) {
                const uniqueWords = [...new Set(tokens.map(t => t.stem))];
                const catMap = new Map();
                
                uniqueWords.forEach(w => {
                    const dict = lookupDictionary(w);
                    const cat = dict.pos;
                    if (!catMap.has(cat)) catMap.set(cat, []);
                    catMap.get(cat).push({ word: w, count: freqMap.get(w), meaning: dict.meaning });
                });
                
                let h = '';
                const cns = { '名词': '📦 名词', '动词': '🏃 动词', '形容词': '🎨 形容词', '副词': '⚡ 副词', '代词': '👤 代词', '感叹词': '💬 感叹词', '外来词': '🌐 外来词', '未知': '📌 其他' };
                for (let [cat, name] of Object.entries(cns)) {
                    const words = catMap.get(cat);
                    if (!words || !words.length) continue;
                    words.sort((a, b) => b.count - a.count);
                    h += `<div class="vocab-category"><h3>${name} (${words.length}个)</h3><table class="vocab-table"><thead><tr><th>韩语</th><th>发音</th><th>释义</th><th>次数</th></tr></thead><tbody>`;
                    words.forEach(w => {
                        const pron = applySoundChanges(w.word).text;
                        h += `<tr><td><strong>${w.word}</strong></td><td><span style="color:#764ba2;">[${pron}]</span></td><td>${w.meaning}</td><td><span class="freq-badge">${w.count}次</span></td></tr>`;
                    });
                    h += `</tbody></table></div>`;
                }
                vc.innerHTML = h;
            }

            function renderGrammar(gl) {
                let h = '';
                if (!gl.length) h = `<p style="color:#999;text-align:center;padding:40px;">未识别到明显语法尾缀</p>`;
                else {
                    h += `<table class="vocab-table"><thead><tr><th>语法/助词</th><th>次数</th><th>解释</th></tr></thead><tbody>`;
                    gl.sort((a, b) => b.count - a.count).forEach(i => h += `<tr><td><strong>${i.grammar}</strong></td><td><span class="freq-badge">${i.count}次</span></td><td>${i.explanation}</td></tr>`);
                    h += `</tbody></table>`;
                }
                gc.innerHTML = h;
            }

            document.getElementById('downloadPdfBtn').addEventListener('click', () => window.print());
        });
    </script>
