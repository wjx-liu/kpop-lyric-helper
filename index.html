<body>
    <div class="container">
        <header>
            <h1>🎧 K-pop 韩语学习助手</h1>

                </div>
                <textarea id="lyricsInput" placeholder="在此粘贴韩语歌词...&#10;例如：음악의 신이 왔다">음악의 신이 왔다</textarea>
                <button id="analyzeBtn" class="primary-btn">✨ 分析歌词</button>
            </section>

                    <button class="tab-btn active" data-tab="sentence">📖 逐句精读</button>

                <div id="vocabularyPanel" class="tab-panel"><div id="vocabularyContent" class="vocabulary-content"></div></div>
                <div id="grammarPanel" class="tab-panel"><div id="grammarContent" class="grammar-content"></div></div>

            </section>
        </main>
        <footer><p>📝 音变规则 · 内置词库 · 韩国国立国语院词典 · 持续完善中</p></footer>
    </div>
    <script>
        // ==================== 本地缓存管理 ====================
        const CACHE_KEY = 'korean_dict_cache';
        function getCache() {
            try {
                return JSON.parse(localStorage.getItem(CACHE_KEY)) || {};
            } catch { return {}; }
        }
        function setCache(word, data) {
            const cache = getCache();
            cache[word] = { ...data, cachedAt: Date.now() };
            localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
        }
        function getCached(word) {
            const cache = getCache();
            return cache[word] || null;
        }

        // ==================== 内置词库 ====================
        const builtinDict = {
            '나': { meaning: '我', pos: '名词' }, '너': { meaning: '你', pos: '名词' }, '우리': { meaning: '我们', pos: '名词' },
            '가운데': { meaning: '中间', pos: '名词' }, '한가운데': { meaning: '正中间', pos: '名词' }, '사랑': { meaning: '爱', pos: '名词' },
            '마음': { meaning: '心', pos: '名词' }, '사람': { meaning: '人', pos: '名词' }, '오늘': { meaning: '今天', pos: '名词' },
            '내일': { meaning: '明天', pos: '名词' }, '시간': { meaning: '时间', pos: '名词' }, '노래': { meaning: '歌', pos: '名词' },
            '꿈': { meaning: '梦', pos: '名词' }, '밤': { meaning: '夜晚', pos: '名词' }, '별': { meaning: '星星', pos: '名词' },
            '하늘': { meaning: '天空', pos: '名词' }, '바다': { meaning: '海', pos: '名词' }, '길': { meaning: '路', pos: '名词' },
            '집': { meaning: '家', pos: '名词' }, '친구': { meaning: '朋友', pos: '名词' }, '이야기': { meaning: '故事', pos: '名词' },
            '기억': { meaning: '记忆', pos: '名词' }, '추억': { meaning: '回忆', pos: '名词' }, '눈물': { meaning: '眼泪', pos: '名词' },
            '음악': { meaning: '音乐', pos: '名词' }, '춤': { meaning: '舞', pos: '名词' }, '신': { meaning: '神', pos: '名词' },
            '가다': { meaning: '去', pos: '动词' }, '오다': { meaning: '来', pos: '动词' }, '하다': { meaning: '做', pos: '动词' },
            '있다': { meaning: '在/有', pos: '动词' }, '없다': { meaning: '没有', pos: '动词' }, '보다': { meaning: '看', pos: '动词' },
            '듣다': { meaning: '听', pos: '动词' }, '말하다': { meaning: '说', pos: '动词' }, '먹다': { meaning: '吃', pos: '动词' },
            '마시다': { meaning: '喝', pos: '动词' }, '자다': { meaning: '睡', pos: '动词' }, '걷다': { meaning: '走', pos: '动词' },
            '만나다': { meaning: '见面', pos: '动词' }, '알다': { meaning: '知道', pos: '动词' }, '모르다': { meaning: '不知道', pos: '动词' },
            '좋아하다': { meaning: '喜欢', pos: '动词' }, '사랑하다': { meaning: '爱', pos: '动词' }, '생각하다': { meaning: '想', pos: '动词' },
            '좋다': { meaning: '好', pos: '形容词' }, '나쁘다': { meaning: '坏', pos: '形容词' }, '크다': { meaning: '大', pos: '形容词' },
            '작다': { meaning: '小', pos: '形容词' }, '많다': { meaning: '多', pos: '形容词' }, '적다': { meaning: '少', pos: '形容词' },
            '예쁘다': { meaning: '漂亮', pos: '形容词' }, '아름답다': { meaning: '美丽', pos: '形容词' }, '재미있다': { meaning: '有趣', pos: '形容词' },
            '슬프다': { meaning: '悲伤', pos: '形容词' }, '기쁘다': { meaning: '高兴', pos: '形容词' }, '바쁘다': { meaning: '忙', pos: '形容词' },
            '같다': { meaning: '一样', pos: '形容词' }, '다르다': { meaning: '不同', pos: '形容词' }, '힘들다': { meaning: '累', pos: '形容词' },
            '너무': { meaning: '太', pos: '副词' }, '정말': { meaning: '真的', pos: '副词' }, '진짜': { meaning: '真的', pos: '副词' },
            '아주': { meaning: '非常', pos: '副词' }, '조금': { meaning: '一点', pos: '副词' }, '많이': { meaning: '很多', pos: '副词' },
            '잘': { meaning: '好地', pos: '副词' }, '못': { meaning: '不能', pos: '副词' }, '안': { meaning: '不', pos: '副词' },
            '함께': { meaning: '一起', pos: '副词' }, '같이': { meaning: '一起', pos: '副词' }, '혼자': { meaning: '独自', pos: '副词' },
            '캐럿': { meaning: 'CARAT', pos: '名词' }, '세븐틴': { meaning: 'SEVENTEEN', pos: '名词' }, '손오공': { meaning: '孙悟空', pos: '名词' },
            '만세': { meaning: '万岁', pos: '名词' }, '파이팅': { meaning: '加油', pos: '感叹词' }, '괜찮아': { meaning: '没关系', pos: '形容词' },
            '고마워': { meaning: '谢谢', pos: '动词' }, 'NICE': { meaning: '好，很棒', pos: '外来词' }, '나이스': { meaning: '好，很棒', pos: '外来词' }
        };

        // ==================== 国立国语院 API 查询 ====================
        async function queryKorDict(word) {
            const cleanWord = word.replace(/[^가-힣]/g, '');
            if (!cleanWord) return null;
            
            // 检查缓存
            const cached = getCached(cleanWord);
            if (cached) return cached;
            
            try {
                // 使用韩国国立国语院开放 API
                const url = `https://krdict.korean.go.kr/api/search?key=8F7E5B9C3A1D2E4F6A8B0C&q=${encodeURIComponent(cleanWord)}&num=1&part=word&translated=y&trans_lang=zh`;
                const response = await fetch(url);
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');
                
                const item = xml.querySelector('item');
                if (!item) return null;
                
                const wordEl = item.querySelector('word');
                const definitionEl = item.querySelector('definition');
                const posEl = item.querySelector('pos');
                
                if (!definitionEl) return null;
                
                const meaning = definitionEl.textContent.trim();
                let pos = posEl ? posEl.textContent.trim() : '未知';
                
                // 词性映射
                const posMap = { '명사': '名词', '동사': '动词', '형용사': '形容词', '부사': '副词', '감탄사': '感叹词', '수사': '数词', '대명사': '代词' };
                pos = posMap[pos] || pos;
                
                const result = { meaning, pos, source: 'krdict' };
                setCache(cleanWord, result);
                return result;
            } catch (e) {
                console.warn('API 查询失败:', e);
                return null;
            }
        }

        // ==================== 统一查询入口 ====================
        async function lookupWord(word) {
            // 1. 先查内置词库
            if (builtinDict[word]) return { ...builtinDict[word], source: 'builtin' };
            
            // 2. 尝试词干匹配
            const stems = [word.replace(/하다$/, ''), word.replace(/다$/, ''), word.replace(/은$|는$|을$|를$|이$|가$/, ''), word.replace(/어$|아$|여$/, '')];
            for (let stem of stems) if (builtinDict[stem]) return { ...builtinDict[stem], source: 'builtin' };
            
            // 3. 特殊变形
            if (word === '있어') return { ...builtinDict['있다'], source: 'builtin' };
            if (word === '가자') return { meaning: '走吧', pos: '动词', source: 'builtin' };
            if (word === '와') return { meaning: '来', pos: '动词', source: 'builtin' };
            
            // 4. 查缓存
            const cached = getCached(word);
            if (cached) return cached;
            
            // 5. 调用 API
            const apiResult = await queryKorDict(word);
            if (apiResult) return apiResult;
            
            return { meaning: '(待补充)', pos: '未知', source: 'pending' };
        }

        // ==================== 韩文处理工具 ====================
        const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
        const JUNG = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
        const JONG = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];

        function decompose(hangul) {
            const code = hangul.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return null;
            const cho = Math.floor(code / 588), jung = Math.floor((code - cho * 588) / 28), jong = code % 28;
            return { cho: CHO[cho], jung: JUNG[jung], jong: JONG[jong] };
        }
        function hasBatchim(char) { const d = decompose(char); return d ? d.jong !== '' : false; }
        function getBatchim(char) {
            const d = decompose(char); if (!d || !d.jong) return null;
            const doubleMap = { 'ㄳ': 'ㄱ', 'ㄵ': 'ㄴ', 'ㄶ': 'ㄴ', 'ㄺ': 'ㄱ', 'ㄻ': 'ㅁ', 'ㄼ': 'ㄹ', 'ㄽ': 'ㄹ', 'ㄾ': 'ㄹ', 'ㄿ': 'ㅂ', 'ㅀ': 'ㄹ', 'ㅄ': 'ㅂ' };
            return doubleMap[d.jong] || d.jong;
        }
        function endsWith(char, batchim) { return getBatchim(char) === batchim; }
        function startsWith(char, target) {
            const d = decompose(char); if (!d) return false;
            if (JUNG.includes(target)) return d.cho === 'ㅇ' && d.jung === target;
            return d.cho === target;
        }

        // ==================== 音变规则 ====================
        function applySoundChanges(text) {
            const chars = text.split(''); const explanations = [];
            for (let i = 0; i < chars.length - 1; i++) {
                const cur = chars[i], nxt = chars[i + 1];
                if (!decompose(cur) || !decompose(nxt)) continue;
                if (endsWith(cur, 'ㅌ') && startsWith(nxt, 'ㅣ')) {
                    const d = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(d.cho) * 588 + JUNG.indexOf(d.jung) * 28);
                    chars[i] = newCur; chars[i + 1] = '치';
                    explanations.push({ original: cur + nxt, changed: newCur + '치', explanation: '「腭化」：收音 \'ㅌ\' 遇到元音 \'ㅣ\'，发音变为 \'ㅊ\'。' });
                    continue;
                }
                if (hasBatchim(cur) && nxt === 'ㅇ') {
                    const batchim = getBatchim(cur), dCur = decompose(cur), dNxt = decompose(nxt);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28);
                    const newNxt = String.fromCharCode(0xAC00 + CHO.indexOf(batchim) * 588 + JUNG.indexOf(dNxt.jung) * 28);
                    chars[i] = newCur; chars[i + 1] = newNxt;
                    explanations.push({ original: cur + nxt, changed: newCur + newNxt, explanation: `「连读」：'ㅇ'不发音，收音 '${batchim}' 移到后面连读。` });
                    continue;
                }
                const batchim = getBatchim(cur);
                const tightMap = { 'ㄱ': 'ㄲ', 'ㄷ': 'ㄸ', 'ㅂ': 'ㅃ', 'ㅅ': 'ㅆ', 'ㅈ': 'ㅉ' };
                if (batchim && ['ㄱ', 'ㄷ', 'ㅂ'].includes(batchim) && tightMap[nxt[0]]) {
                    const dNxt = decompose(nxt);
                    const newNxt = String.fromCharCode(0xAC00 + CHO.indexOf(tightMap[nxt[0]]) * 588 + JUNG.indexOf(dNxt.jung) * 588 + (dNxt.jong ? JONG.indexOf(dNxt.jong) : 0));
                    chars[i + 1] = newNxt;
                    explanations.push({ original: cur + nxt, changed: cur + newNxt, explanation: `「紧音化」：收音 '${batchim}' 后遇到 '${nxt[0]}'，变为紧音 '${tightMap[nxt[0]]}'。` });
                }
                if (batchim && ['ㄱ', 'ㄷ', 'ㅂ'].includes(batchim) && ['ㄴ', 'ㅁ'].includes(nxt[0])) {
                    const nasalMap = { 'ㄱ': 'ㅇ', 'ㄷ': 'ㄴ', 'ㅂ': 'ㅁ' };
                    const dCur = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28 + JONG.indexOf(nasalMap[batchim]));
                    chars[i] = newCur;
                    explanations.push({ original: cur + nxt, changed: newCur + nxt, explanation: `「鼻音化」：收音 '${batchim}' 遇到鼻音 '${nxt[0]}'，变为 '${nasalMap[batchim]}'。` });
                }
                if (batchim === 'ㄴ' && nxt[0] === 'ㄹ') {
                    const dCur = decompose(cur);
                    const newCur = String.fromCharCode(0xAC00 + CHO.indexOf(dCur.cho) * 588 + JUNG.indexOf(dCur.jung) * 28 + JONG.indexOf('ㄹ'));
                    chars[i] = newCur;
                    explanations.push({ original: cur + nxt, changed: newCur + nxt, explanation: `「流音化」：收音 'ㄴ' 遇到 'ㄹ'，变为 'ㄹ'。` });
                }
            }
            return { text: chars.join(''), explanations };
        }

        // ==================== 分词器 ====================
        const particles = ['은', '는', '이', '가', '을', '를', '에', '에서', '로', '으로', '와', '과', '의', '도', '만', '까지', '부터', '처럼'];
        const endings = ['다', '요', '죠', '네', '군', '구나', '지', '고', '서', '니까', '면', '며', '지만', '자'];
        function tokenize(text) {
            const words = text.split(/\s+/); const tokens = [];
            words.forEach(word => {
                let matched = false;
                for (let p of particles) if (word.endsWith(p) && word.length > p.length) { tokens.push({ original: word, stem: word.slice(0, -p.length), particle: p, ending: null }); matched = true; break; }
                if (!matched) for (let e of endings) if (word.endsWith(e) && word.length > e.length) { tokens.push({ original: word, stem: word.slice(0, -e.length), particle: null, ending: e }); matched = true; break; }
                if (!matched) tokens.push({ original: word, stem: word, particle: null, ending: null });
            });
            return tokens;
        }

        // ==================== 主程序 ====================
        document.addEventListener('DOMContentLoaded', function() {
            const inp = document.getElementById('lyricsInput'), ab = document.getElementById('analyzeBtn'), rs = document.getElementById('resultsSection');
            const sc = document.getElementById('sentenceContent'), vc = document.getElementById('vocabularyContent'), gc = document.getElementById('grammarContent');
            const tbs = document.querySelectorAll('.tab-btn'), tps = document.querySelectorAll('.tab-panel'), ebs = document.querySelectorAll('.example-btn');

            tbs.forEach(b => b.addEventListener('click', () => { const tid = b.dataset.tab; tbs.forEach(bn => bn.classList.remove('active')); tps.forEach(p => p.classList.remove('active')); b.classList.add('active'); document.getElementById(tid + 'Panel').classList.add('active'); }));
            ebs.forEach(b => b.addEventListener('click', () => { inp.value = b.dataset.lyric; analyzeLyrics(); }));
            ab.addEventListener('click', analyzeLyrics);

            async function analyzeLyrics() {
                const text = inp.value.trim(); if (!text) { alert('请输入韩语歌词'); return; }
                rs.style.display = 'block';
                sc.innerHTML = '<p style="color:#999; padding:40px; text-align:center;">⏳ 正在分析并查询词典...</p>';
                
                const tokens = tokenize(text), snd = applySoundChanges(text);
                
                // 收集所有需要查询的词
                const wordsToQuery = [...new Set(tokens.map(t => t.stem))];
                const queryPromises = wordsToQuery.map(w => lookupWord(w));
                await Promise.all(queryPromises);
                
                // 词频统计
                const freqMap = new Map(), categoryMap = new Map();
                tokens.forEach(t => { const w = t.stem; freqMap.set(w, (freqMap.get(w) || 0) + 1); });
                
                // 语法提取
                const gf = new Map(); tokens.forEach(t => { if (t.ending) gf.set(t.ending, (gf.get(t.ending) || 0) + 1); if (t.particle) gf.set(t.particle, (gf.get(t.particle) || 0) + 1); });
                const expl = { '는': '主题助词', '은': '主题助词', '가': '主格助词', '이': '主格助词', '를': '宾格助词', '을': '宾格助词', '에': '地点/时间助词', '요': '敬语词尾', '다': '基本形词尾', '고': '连接词尾', '자': '共动式词尾' };
                const gl = Array.from(gf.entries()).map(([g, c]) => ({ grammar: g, count: c, explanation: expl[g] || '待补充' }));
                
                renderSentence(tokens, snd);
                renderVocab(tokens, freqMap);
                renderGrammar(gl);
                rs.scrollIntoView({ behavior: 'smooth' });
            }

            async function renderSentence(tokens, snd) {
                let h = `<div class="sentence-item"><div class="sentence-original">📝 原文：${tokens.map(t => t.original).join(' ')}</div><div class="sentence-original" style="font-size:1.1rem;color:#764ba2;">🔊 发音：${snd.text}</div><div class="word-breakdown">`;
                
                for (let t of tokens) {
                    const dict = await lookupWord(t.stem);
                    const pron = applySoundChanges(t.stem).text;
                    const sourceTag = dict.source === 'krdict' ? '<span class="word-source" title="韩国国立国语院词典">📖</span>' : '';
                    h += `<div class="word-card"><span class="word-text">${t.stem}</span><span class="word-pronunciation">[${pron}]</span>${sourceTag}<span style="display:block;font-size:0.85rem;color:#666;margin-top:4px;">${dict.meaning}</span>${t.particle ? `<span style="display:block;font-size:0.8rem;color:#999;">+ ${t.particle} (助词)</span>` : ''}${t.ending ? `<span style="display:block;font-size:0.8rem;color:#999;">+ ${t.ending} (词尾)</span>` : ''}</div>`;
                }
                h += `</div>`;
                if (snd.explanations.length) { h += `<div style="margin-top:16px;"><h4>🔬 音变现象解释：</h4>`; snd.explanations.forEach(e => h += `<div class="rule-explanation"><strong>${e.original} → ${e.changed}</strong><br>${e.explanation}</div>`); h += `</div>`; }
                sc.innerHTML = h + `</div>`;
            }

            async function renderVocab(tokens, freqMap) {
                const uniqueWords = [...new Set(tokens.map(t => t.stem))];
                const catMap = new Map();
                
                for (let w of uniqueWords) {
                    const dict = await lookupWord(w);
                    const cat = dict.pos;
                    if (!catMap.has(cat)) catMap.set(cat, []);
                    catMap.get(cat).push({ word: w, count: freqMap.get(w), meaning: dict.meaning, source: dict.source });
                }
                
                let h = '';
                const cns = { '名词': '📦 名词', '动词': '🏃 动词', '形容词': '🎨 形容词', '副词': '⚡ 副词', '感叹词': '💬 感叹词', '外来词': '🌐 外来词', '未知': '📌 其他' };
                for (let [cat, name] of Object.entries(cns)) {
                    const words = catMap.get(cat);
                    if (!words || !words.length) continue;
                    words.sort((a, b) => b.count - a.count);
                    h += `<div class="vocab-category"><h3>${name} (${words.length}个)</h3><table class="vocab-table"><thead><tr><th>韩语</th><th>发音</th><th>释义</th><th>次数</th></tr></thead><tbody>`;
                    for (let w of words) {
                        const pron = applySoundChanges(w.word).text;
                        const sourceIcon = w.source === 'krdict' ? ' 📖' : '';
                        h += `<tr><td><strong>${w.word}</strong></td><td><span style="color:#764ba2;">[${pron}]</span></td><td>${w.meaning}${sourceIcon}</td><td><span class="freq-badge">${w.count}次</span></td></tr>`;
                    }
                    h += `</tbody></table></div>`;
                }
                vc.innerHTML = h;
            }

            function renderGrammar(gl) {
                let h = '';
                if (!gl.length) h = `<p style="color:#999;text-align:center;padding:40px;">未识别到明显语法尾缀</p>`;
                else { h += `<table class="vocab-table"><thead><tr><th>语法/助词</th><th>次数</th><th>解释</th></tr></thead><tbody>`; gl.sort((a,b) => b.count - a.count).forEach(i => h += `<tr><td><strong>${i.grammar}</strong></td><td><span class="freq-badge">${i.count}次</span></td><td>${i.explanation}</td></tr>`); h += `</tbody></table>`; }
                gc.innerHTML = h;
            }

            document.getElementById('downloadPdfBtn').addEventListener('click', () => window.print());
        });
    </script>
</body>
